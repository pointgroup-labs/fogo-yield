[package]
name = "fogo-relayer"
version = "0.1.0"
description = "Fogo OnRe relayer — stateless PDA-custody relay between Wormhole Gateway, OnRe, and Wormhole NTT on Solana"
edition = { workspace = true }

[lib]
crate-type = ["cdylib", "lib"]
name = "fogo_relayer"

[features]
default = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]
mainnet = []
devnet = []

[dependencies]
anchor-lang = { workspace = true }
anchor-spl = { workspace = true }
solana-keccak-hasher = "3.1"

[dev-dependencies]
# Used by the discriminator-derivation guard test in `state.rs` to recompute
# `sha256("global:<ix_name>")[..8]` and assert it matches the on-chain
# constants. Test-only so the deployed program isn't bloated.
solana-sha256-hasher = "3.1"

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = [
  'cfg(feature, values("anchor-debug", "no-entrypoint", "no-log-ix-name", "cpi", "custom-heap", "custom-panic"))',
  'cfg(target_os, values("solana"))',
]

[lints.clippy]
all = "warn"
