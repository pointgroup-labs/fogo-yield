name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (fmt + clippy + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Toolchain version AND components are pinned by `rust-toolchain.toml`.
      # The action installs `stable` first; rustup honours the toml override
      # on the first cargo invocation, so listing `components` here would
      # only apply them to `stable`, not to the pinned channel fmt/clippy
      # actually run against.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # `-D warnings` keeps lints from accumulating on main. Prefer
      # `#[allow(..)]` with a justification over relaxing this gate.
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      # `--lib` skips the Anchor IDL build pipeline.
      - name: Unit tests
        run: cargo test -p fogo-onre-relayer --lib

  typescript:
    name: typescript (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Bumping pnpm requires updating `packageManager` in package.json too.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test
