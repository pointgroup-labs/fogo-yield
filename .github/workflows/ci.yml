name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (fmt + clippy + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Toolchain version AND components are pinned by `rust-toolchain.toml`.
      # The action installs `stable` first; rustup honours the toml override
      # on the first cargo invocation, so listing `components` here would
      # only apply them to `stable`, not to the pinned channel fmt/clippy
      # actually run against.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # `-D warnings` keeps lints from accumulating on main. Prefer
      # `#[allow(..)]` with a justification over relaxing this gate.
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      # `--lib` skips the Anchor IDL build pipeline.
      - name: Unit tests
        run: cargo test -p fogo-ntt-relayer --lib

  intent-fork:
    name: intent-fork (audit-carryover source-diff gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Asserts the vendored fork `src/` differs from the pinned upstream
      # commit by ONLY `declare_id!`. The reproducible-build hash half of
      # the gate needs Docker + solana-verify and runs at deploy time
      # (deploy-mainnet.md §3.1), so skip it here; the source-diff is the
      # property that must hold on every PR.
      - name: Source-diff against pinned upstream
        env:
          SKIP_REPRODUCIBLE_BUILD: '1'
        run: scripts/verify-intent-fork.sh

  typescript:
    name: typescript (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Version derives from `packageManager` in package.json (single source
      # of truth) — do not also set `version:` here or action-setup errors.
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # The LiteSVM suite loads exactly one build artifact —
      # `target/deploy/fogo_ntt_relayer.so`. The committed IDL + generated
      # types (`packages/sdk/src/{idl,types}`) mean nothing else consumes
      # `anchor build` output, so cache the .so and skip the ~5-min SBF
      # compile (plus the Solana + Anchor toolchain install) whenever the
      # relayer source, lockfile, and toolchain pins are unchanged.
      # Exact-key only — no restore-keys — so any input change rebuilds
      # rather than ever loading a stale .so against new source.
      - name: Cache relayer .so
        id: relayer-so
        uses: actions/cache@v6
        with:
          path: target/deploy/fogo_ntt_relayer.so
          key: relayer-so-${{ hashFiles('programs/relayer/**', 'Cargo.lock', 'Cargo.toml', 'Anchor.toml', 'rust-toolchain.toml') }}

      # Everything down to `Build relayer .so` is the cold-build path only;
      # on a cache hit the .so is restored and these are all skipped.
      - if: steps.relayer-so.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install Solana
        if: steps.relayer-so.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.8/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # Prebuilt binary — far cheaper than compiling anchor-cli from source.
      # 1.1.2 matches Anchor.toml's pin, so anchor runs it directly (no avm).
      - name: Install Anchor
        if: steps.relayer-so.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://github.com/solana-foundation/anchor/releases/download/v1.1.2/anchor-1.1.2-x86_64-unknown-linux-gnu -o "$HOME/.local/bin/anchor"
          chmod +x "$HOME/.local/bin/anchor"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/anchor" --version

      - name: Build relayer .so
        if: steps.relayer-so.outputs.cache-hit != 'true'
        run: anchor build --ignore-keys

      # Call vitest directly, NOT `pnpm test`: its `pretest` hook reruns
      # `anchor build`, which would defeat the cache above. Local `pnpm
      # test` keeps its rebuild-then-test behavior unchanged.
      - name: Tests
        run: |
          pnpm sdk build
          pnpm exec vitest run
