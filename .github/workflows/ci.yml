name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (fmt + clippy + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Toolchain version AND components are pinned by `rust-toolchain.toml`.
      # The action installs `stable` first; rustup honours the toml override
      # on the first cargo invocation, so listing `components` here would
      # only apply them to `stable`, not to the pinned channel fmt/clippy
      # actually run against.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # `-D warnings` keeps lints from accumulating on main. Prefer
      # `#[allow(..)]` with a justification over relaxing this gate.
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      # `--lib` skips the Anchor IDL build pipeline.
      - name: Unit tests
        run: cargo test -p fogo-onre-relayer --lib

  intent-fork:
    name: intent-fork (audit-carryover source-diff gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Asserts the vendored fork `src/` differs from the pinned upstream
      # commit by ONLY `declare_id!`. The reproducible-build hash half of
      # the gate needs Docker + solana-verify and runs at deploy time
      # (deploy-mainnet.md §3.1), so skip it here; the source-diff is the
      # property that must hold on every PR.
      - name: Source-diff against pinned upstream
        env:
          SKIP_REPRODUCIBLE_BUILD: '1'
        run: scripts/verify-intent-fork.sh

  typescript:
    name: typescript (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Version derives from `packageManager` in package.json (single source
      # of truth) — do not also set `version:` here or action-setup errors.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test

      # Webapp typecheck + Next.js build. Without this, a webapp-only
      # type break (or missing env-gate misuse) ships green to main.
      # NODE_ENV=production is implicit in `next build`; we set the
      # required public env vars to placeholder values so `resolveAppDomain`
      # / `resolveSolanaRpcDefault` don't throw in CI.
      - name: Webapp build
        env:
          NEXT_PUBLIC_APP_DOMAIN: https://ci.example
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
        run: pnpm webapp build
