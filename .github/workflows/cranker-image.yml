name: cranker-image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'packages/cranker/**'
      - 'packages/sdk/**'
      - deploy/cranker/Dockerfile
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/cranker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cranker-image-${{ github.ref }}
  # Cancel superseded runs on branches, but never on tag refs — a tag
  # push always corresponds to a release artifact we want to publish.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: ubuntu-24.04
    # Hard ceiling so a stuck buildx layer can't consume an entire
    # runner-hour budget.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # QEMU lets a single amd64 runner emit arm64 layers via emulation.
      # Cranker is Node-only — no native compile in the critical path —
      # so the emulation tax is limited to running pnpm/tsup under
      # qemu-aarch64 during install/build (a few extra minutes, not
      # multiplicative). If that ever becomes painful, switch to a
      # matrix with `runs-on: ubuntu-24.04-arm` per arch and merge
      # manifests via docker/manifest-action — faster but more
      # workflow surface to maintain.
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker
          # Tag matrix:
          #   - `:edge`              — moving pointer at default branch tip
          #   - `:<branch>`          — sanitized branch name (e.g. `:main`,
          #                            `:feature-foo`); lets ops pin to a
          #                            specific branch's latest build
          #                            without chasing a sha
          #   - `:sha-<full-sha>`    — immutable per-commit identifier
          #   - `:vX.Y.Z` / `:vX.Y`  — semver tags from `v*` git tags
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/cranker/Dockerfile
          # Multi-arch: amd64 for typical cloud servers, arm64 for
          # Apple-silicon dev workstations and Graviton/Ampere hosts.
          # Single tag, multi-arch manifest — `docker pull` picks the
          # matching arch automatically.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache lives in ghcr alongside the image: persists
          # across branches, isn't capped at 10 GB like type=gha, and
          # isn't evicted when other workflows pressure the cache.
          # `mode=max` exports intermediate layers too — costs a bit
          # more storage, saves a lot of time on partial-hit rebuilds.
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker:buildcache
            type=gha
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker:buildcache,mode=max
            type=gha,mode=max
          provenance: false

      # NOTE: Container CVE scanning was previously wired here via
      # `aquasecurity/trivy-action`, but the action's tag scheme kept
      # drifting out from under our pin (`@0.28.0`, `@0.36.0` both
      # failed to resolve). Removed from the build/push critical path
      # to keep the pipeline reliable. If we want gating back, prefer
      # one of:
      #   1. A separate `cranker-image-scan.yml` on a `schedule:`
      #      trigger that scans the latest `:edge` digest — keeps
      #      transient action-resolution failures off release pushes.
      #   2. Install Trivy via its official install script in a
      #      `run:` step (`curl ... | sh`) — bypasses the action
      #      wrapper entirely.
